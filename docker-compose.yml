version: '3.8'

services:
  instagram-monitor-bot:
    build: .
    container_name: instagram-monitor-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - INSTAGRAM_USERNAME=${INSTAGRAM_USERNAME}
      - INSTAGRAM_PASSWORD=${INSTAGRAM_PASSWORD}
      - DATABASE_PATH=${DATABASE_PATH:-/app/data/monitor.db}
      - DATABASE_BACKUP_PATH=${DATABASE_BACKUP_PATH:-/app/data/backups}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE=${LOG_FILE:-/app/logs/bot.log}
      - POLL_INTERVAL=${POLL_INTERVAL:-300}
      - MAX_POSTS_PER_POLL=${MAX_POSTS_PER_POLL:-10}
      - SENTIMENT_THRESHOLD=${SENTIMENT_THRESHOLD:-0.7}
      - NOTIFY_ON_NEW_POSTS=${NOTIFY_ON_NEW_POSTS:-true}
      - NOTIFY_ON_HIGH_ENGAGEMENT=${NOTIFY_ON_HIGH_ENGAGEMENT:-true}
      - NOTIFY_ON_SENTIMENT_ALERTS=${NOTIFY_ON_SENTIMENT_ALERTS:-true}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: always
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
